name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # lets you click "Run workflow" manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o *.zip
          ls -la sitewatch-app

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform & build-tools
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Make gradlew executable
        working-directory: sitewatch-app
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: sitewatch-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sitewatch-debug-apk
          path: sitewatch-app/app/build/outputs/apk/debug/app-debug.apk
